server.port=${SERVER_PORT:8081}

# Production datasource
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/springbootdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Production API behavior
spring.h2.console.enabled=false
spring.cache.type=simple

# JWT
app.jwt.secret=${APP_JWT_SECRET:CHANGE_THIS_TO_A_LONG_RANDOM_SECRET_32+CHARS}
app.jwt.expiry-ms=${APP_JWT_EXPIRY_MS:3600000}

# Logging
logging.level.root=INFO
logging.level.com.isanjalee.demo.springbootdemo=INFO

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
